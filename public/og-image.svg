<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080E1C"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="180"  cy="180"  rx="320" ry="220" fill="#2563EB" opacity="0.08"/>
  <ellipse cx="1050" cy="460"  rx="280" ry="200" fill="#4F46E5" opacity="0.07"/>
  <ellipse cx="950"  cy="80"   rx="220" ry="160" fill="#0EA5E9" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#2563EB" opacity="0.9"/>

  <!-- Brand badge -->
  <rect x="478" y="76" width="244" height="34" rx="17" fill="#1E293B"/>
  <text x="600" y="98" fill="#64748B" font-size="12" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" font-weight="600" letter-spacing="2">ESALT WEB SERVICES</text>

  <!-- Main title -->
  <text x="600" y="214" fill="#FFFFFF" font-size="86" font-weight="800" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" letter-spacing="-2">salt-theme-gen</text>

  <!-- Subtitle -->
  <text x="600" y="270" fill="#94A3B8" font-size="26" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" font-weight="400" letter-spacing="0.2">Design Tokens for Every Framework</text>

  <!-- Blue accent line -->
  <rect x="552" y="300" width="96" height="3" rx="2" fill="#2563EB"/>

  <!-- Color swatches — 10 circles centered -->
  <!-- total width: 10×52 + 9×14 = 520+126 = 646, start x = 600-323 = 277 -->
  <circle cx="303"  cy="374" r="26" fill="#2563EB" filter="url(#glow)"/>
  <circle cx="369"  cy="374" r="26" fill="#4F46E5"/>
  <circle cx="435"  cy="374" r="26" fill="#0EA5E9"/>
  <circle cx="501"  cy="374" r="26" fill="#7C3AED"/>
  <circle cx="567"  cy="374" r="26" fill="#DB2777"/>
  <circle cx="633"  cy="374" r="26" fill="#DC2626"/>
  <circle cx="699"  cy="374" r="26" fill="#D97706"/>
  <circle cx="765"  cy="374" r="26" fill="#16A34A"/>
  <circle cx="831"  cy="374" r="26" fill="#0F766E"/>
  <circle cx="897"  cy="374" r="26" fill="#64748B"/>

  <!-- Swatch caption -->
  <text x="600" y="428" fill="#334155" font-size="13" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" letter-spacing="0.3">ocean preset · 20 themes available</text>

  <!-- Framework pills -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" fill="#60A5FA">
    <rect x="214" y="452" width="74"  height="26" rx="13" fill="#1E293B"/>
    <text x="251"  y="469" text-anchor="middle">React</text>

    <rect x="296" y="452" width="74"  height="26" rx="13" fill="#1E293B"/>
    <text x="333"  y="469" text-anchor="middle">Next.js</text>

    <rect x="378" y="452" width="60"  height="26" rx="13" fill="#1E293B"/>
    <text x="408"  y="469" text-anchor="middle">Vue</text>

    <rect x="446" y="452" width="80"  height="26" rx="13" fill="#1E293B"/>
    <text x="486"  y="469" text-anchor="middle">Angular</text>

    <rect x="534" y="452" width="74"  height="26" rx="13" fill="#1E293B"/>
    <text x="571"  y="469" text-anchor="middle">Svelte</text>

    <rect x="616" y="452" width="60"  height="26" rx="13" fill="#1E293B"/>
    <text x="646"  y="469" text-anchor="middle">Nuxt</text>

    <rect x="684" y="452" width="68"  height="26" rx="13" fill="#1E293B"/>
    <text x="718"  y="469" text-anchor="middle">Remix</text>

    <rect x="760" y="452" width="64"  height="26" rx="13" fill="#1E293B"/>
    <text x="792"  y="469" text-anchor="middle">Astro</text>

    <rect x="832" y="452" width="116" height="26" rx="13" fill="#1E293B"/>
    <text x="890"  y="469" text-anchor="middle">React Native</text>
  </g>

  <!-- npm install pill -->
  <rect x="388" y="502" width="424" height="46" rx="10" fill="#0D1526" stroke="#1E3A5F" stroke-width="1"/>
  <text x="600" y="531" fill="#4A6580" font-size="15" font-family="'Fira Code', 'Cascadia Code', monospace" text-anchor="middle">npm install salt-theme-gen</text>

  <!-- Footer bar -->
  <rect x="0" y="596" width="1200" height="34" fill="#060C18"/>
  <text x="600" y="618" fill="#1E3A5F" font-size="13" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" letter-spacing="1">learn.esalt.net</text>
</svg>

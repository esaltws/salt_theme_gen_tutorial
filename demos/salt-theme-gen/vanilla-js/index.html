<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>salt-theme-gen — Vanilla JS</title>
  <script>
    try {
      if (localStorage.getItem('theme') === 'dark' ||
          (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {}
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: var(--space-xl, 32px);
      background: var(--color-background, #fff);
      color: var(--color-text, #111);
      min-height: 100vh;
    }
    h1 { font-size: var(--text-xl, 20px); margin-bottom: var(--space-sm, 8px); }
    h2 { font-size: var(--text-md, 16px); margin-bottom: var(--space-sm, 8px); }
    p  { color: var(--color-muted, #666); margin-bottom: var(--space-lg, 24px); font-size: var(--text-sm, 14px); }
    .card {
      background: var(--color-surface, #f5f5f5);
      border: 1px solid var(--color-border, #e0e0e0);
      border-radius: var(--radius-lg, 12px);
      padding: var(--space-lg, 24px);
      margin-bottom: var(--space-lg, 24px);
    }
    .btn {
      background: var(--color-primary, #2563eb);
      color: var(--color-on-primary, #fff);
      border: none;
      padding: var(--space-sm, 8px) var(--space-md, 16px);
      border-radius: var(--radius-md, 8px);
      cursor: pointer;
      font-size: var(--text-sm, 14px);
      margin-bottom: var(--space-xl, 32px);
    }
    .swatches { display: flex; gap: var(--space-sm, 8px); flex-wrap: wrap; }
    .swatch {
      width: 48px; height: 48px;
      border-radius: var(--radius-sm, 4px);
      border: 1px solid var(--color-border, #e0e0e0);
    }
    .spacing-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .spacing-label { width: 40px; font-size: 12px; color: var(--color-muted, #666); }
    .spacing-bar { height: 4px; background: var(--color-primary, #2563eb); }
    .spacing-value { font-size: 12px; color: var(--color-muted, #666); }
  </style>
</head>
<body>
  <h1>salt-theme-gen — Vanilla JS</h1>
  <p>Preset: ocean &nbsp;·&nbsp; <span id="mode-label">light mode</span></p>
  <button class="btn" id="toggle">Toggle dark mode</button>

  <div class="card">
    <h2>Color palette</h2>
    <div class="swatches" id="swatches"></div>
  </div>

  <div class="card">
    <h2>Spacing scale</h2>
    <div id="spacing"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
